name: Build Windows Portable Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: windows-exe-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Determine release version
        id: release_version
        shell: pwsh
        run: |
          $release = node scripts/bump-release-version.cjs | ConvertFrom-Json
          "version=$($release.version)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "tag=$($release.tag)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "existing_tag=$($release.existingTag.ToString().ToLower())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Build Windows executable
        run: pnpm electron:build:win

      - name: Create release tag
        if: steps.release_version.outputs.existing_tag != 'true'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.release_version.outputs.tag }}"
          git push origin "${{ steps.release_version.outputs.tag }}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_version.outputs.tag }}
          name: ${{ steps.release_version.outputs.tag }}
          draft: false
          generate_release_notes: true
          files: |
            release/${{ steps.release_version.outputs.version }}/*.exe
